<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>i love you</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='35%25' r='70%25'%3E%3Cstop offset='0%25' stop-color='%23ff9abb'/%3E%3Cstop offset='45%25' stop-color='%23ff2d75'/%3E%3Cstop offset='100%25' stop-color='%23b8003d'/%3E%3C/radialGradient%3E%3Cfilter id='s' x='-20%25' y='-20%25' width='140%25' height='140%25'%3E%3CfeDropShadow dx='0' dy='4' stdDeviation='4' flood-color='%23ff2d75' flood-opacity='.55'/%3E%3C/filter%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%23050508'/%3E%3Cpath filter='url(%23s)' fill='url(%23g)' d='M32 54S9 40.5 9 23.8C9 15.6 15.1 10 22.2 10c4.4 0 7.8 2 9.8 5.1C34 12 37.4 10 41.8 10 48.9 10 55 15.6 55 23.8 55 40.5 32 54 32 54Z'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #050508;
      --pink: #ff2d75;
      --pink-soft: #ff7aa8;
      --red: #ff174f;
      --white: #fff7fb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 45, 117, 0.16), transparent 34%),
        radial-gradient(circle at 50% 74%, rgba(255, 0, 80, 0.2), transparent 26%),
        linear-gradient(180deg, #09090f, var(--bg));
    }



    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      perspective: 900px;
      padding: 24px 18px;
    }

    .intro {
      text-align: center;
      z-index: 8;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .intro.hide {
      opacity: 0;
      transform: translateY(16px) scale(0.96);
      pointer-events: none;
    }

    .main-title {
      font-size: clamp(34px, 7vw, 70px);
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0 28px rgba(255, 45, 117, 0.7);
    }

    .log {
      margin: 22px auto 0;
      width: min(560px, 92vw);
      text-align: left;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: clamp(11px, 2vw, 13px);
      color: rgba(255, 122, 168, 0.9);
      line-height: 1.7;
    }

    .log-line {
      opacity: 0;
      transform: translateY(8px);
      animation: lineIn 0.45s ease forwards;
    }

    .log-line:nth-child(2) { animation-delay: 0.45s; }
    .log-line:nth-child(3) { animation-delay: 0.9s; }
    .log-line:nth-child(4) { animation-delay: 1.35s; }

    @keyframes lineIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .button {
      margin-top: 22px;
      border: 0;
      border-radius: 10px;
      padding: 13px 24px;
      color: white;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #ff2d75, #b8003d);
      box-shadow: 0 12px 38px rgba(255, 45, 117, 0.36);
      opacity: 0;
      transform: translateY(10px);
      animation: buttonIn 0.45s ease forwards 2s;
    }

    .button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    @keyframes buttonIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .heart-wrap {
      position: absolute;
      width: min(92vw, 760px);
      aspect-ratio: 1 / 0.9;
      transform-style: preserve-3d;
      opacity: 0;
      pointer-events: none;
    }

    .heart-wrap.show {
      opacity: 1;
      animation: heartAppear 1.1s ease forwards, beat 1.7s ease-in-out infinite 1.2s;
    }

    @keyframes heartAppear {
      from {
        transform: rotateX(18deg) scale(0.72);
        filter: blur(6px);
      }
      to {
        transform: rotateX(0deg) scale(1);
        filter: blur(0);
      }
    }

    @keyframes beat {
      0%, 100% { scale: 1; }
      14% { scale: 1.035; }
      28% { scale: 1; }
      42% { scale: 1.025; }
      70% { scale: 1; }
    }

    .heart-word {
      position: absolute;
      left: calc(var(--x) * 1%);
      top: calc(var(--y) * 1%);
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: clamp(7px, 1.3vw, 13px);
      white-space: nowrap;
      color: hsl(var(--hue), 100%, var(--light));
      text-shadow:
        0 0 7px rgba(255, 45, 117, 0.85),
        0 0 18px rgba(255, 45, 117, 0.5);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2) rotate(var(--rot));
      animation: wordIn 0.75s cubic-bezier(.2,.9,.2,1.15) forwards;
      animation-delay: calc(var(--delay) * 1ms);
    }

    @keyframes wordIn {
      to {
        opacity: var(--opacity);
        transform: translate(-50%, -50%) scale(1) rotate(var(--rot));
      }
    }

    .center-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: clamp(34px, 7vw, 72px);
      font-weight: 950;
      text-align: center;
      color: white;
      text-shadow:
        0 0 22px rgba(255, 255, 255, 0.5),
        0 0 46px rgba(255, 45, 117, 0.9);
      opacity: 0;
      transform: scale(0.9);
      animation: centerIn 0.8s ease forwards 1.15s;
      pointer-events: none;
    }

    @keyframes centerIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .glow {
      position: fixed;
      left: 50%;
      bottom: 6%;
      width: min(640px, 90vw);
      height: 110px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(255, 45, 117, 0.34), transparent 65%);
      filter: blur(18px);
      pointer-events: none;
      opacity: 0.85;
    }

    @media (max-width: 520px) {
      .heart-wrap {
        width: 106vw;
      }

      .heart-word {
        font-size: 7px;
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <section class="intro" id="intro">
      <h1 class="main-title">Love you.</h1>
      <div class="log">
        <div class="log-line">[system] Initializing HEART_PROTOCOL_v2.0...</div>
        <div class="log-line">[status] Loading memory fragments...</div>
        <div class="log-line">[fonts] Preloading custom heart font for you...</div>
        <div class="log-line">[ready] One message is waiting.</div>
      </div>
      <button class="button" id="startBtn">ACCEPT MESSAGE</button>
    </section>

    <section class="heart-wrap" id="heart"></section>
    <div class="glow"></div>
  </main>

  <script>
    const heart = document.getElementById("heart");
    const intro = document.getElementById("intro");
    const startBtn = document.getElementById("startBtn");
    const stage = document.getElementById("stage");

    const words = ["I love you", "love you", "forever", "my heart", "<3"];
    const points = [];
    const step = 0.105;

    for (let y = 1.35; y >= -1.25; y -= step) {
      for (let x = -1.45; x <= 1.45; x += step) {
        const v = Math.pow(x * x + y * y - 1, 3) - x * x * Math.pow(y, 3);
        if (v <= 0) {
          const px = 50 + x * 31;
          const py = 53 - y * 35;
          const centerBoost = 1 - Math.min(1, Math.hypot(x, y) / 1.55);
          points.push({ x: px, y: py, boost: centerBoost });
        }
      }
    }

    function makeHeart() {
      const fragment = document.createDocumentFragment();

      points.forEach((point, index) => {
        const span = document.createElement("span");
        span.className = "heart-word";
        span.textContent = words[(index + Math.floor(point.x)) % words.length];

        const delay = Math.random() * 900 + point.y * 4;
        const hue = 336 + Math.random() * 15;
        const light = 50 + point.boost * 34 + Math.random() * 8;
        const opacity = 0.56 + point.boost * 0.42;
        const rot = (Math.random() * 10 - 5).toFixed(2) + "deg";

        span.style.setProperty("--x", point.x.toFixed(3));
        span.style.setProperty("--y", point.y.toFixed(3));
        span.style.setProperty("--delay", delay.toFixed(0));
        span.style.setProperty("--hue", hue.toFixed(1));
        span.style.setProperty("--light", light.toFixed(1) + "%");
        span.style.setProperty("--opacity", opacity.toFixed(2));
        span.style.setProperty("--rot", rot);
        fragment.appendChild(span);
      });

      const center = document.createElement("div");
      center.className = "center-text";
      center.textContent = "Love you.";
      fragment.appendChild(center);

      heart.innerHTML = "";
      heart.appendChild(fragment);
    }

    function showHeart() {
      makeHeart();
      intro.classList.add("hide");
      heart.classList.add("show");
    }

    startBtn.addEventListener("click", showHeart);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") showHeart();
    });

    window.addEventListener("mousemove", (event) => {
      if (!heart.classList.contains("show")) return;
      const x = (event.clientX / window.innerWidth - 0.5) * 10;
      const y = (event.clientY / window.innerHeight - 0.5) * -8;
      heart.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
    });
  </script>
</body>
</html>
